<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Chamada Entrante</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
font-weight:bold;
transition:background 0.2s;
flex-direction:column;
}

#titulo{
font-size:7vw;
}

#numero{
font-size:4vw;
margin-top:20px;
}

.verde{
background:#00ff00;
color:white;
}

.branco{
background:white;
color:#009900;
}

</style>
</head>

<body class="verde">

<div id="titulo">CHAMADA ENTRANTE</div>
<div id="numero"></div>

<audio id="ring" loop>
<source src="https://actions.google.com/sounds/v1/alarms/phone_alerts_and_rings.ogg" type="audio/ogg">
</audio>

<script>

let estado=true

setInterval(()=>{
document.body.className=estado?"branco":"verde"
estado=!estado
},400)

let audio=document.getElementById("ring")

window.onload=()=>{
audio.play().catch(()=>{})

let params = new URLSearchParams(window.location.search)

let numero = params.get("numero")
let nome = params.get("nome")

if(numero || nome){

document.getElementById("numero").innerHTML =
(nome ? nome+"<br>" : "") + (numero ? numero : "")

}

}

window.addEventListener("beforeunload",function(){
audio.pause()
audio.currentTime=0
})

</script>

</body>
</html>
